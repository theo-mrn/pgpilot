name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dbpilot-${{ matrix.os }}-${{ matrix.arch }} \
            ./cmd/dbpilot

      - uses: actions/upload-artifact@v4
        with:
          name: dbpilot-${{ matrix.os }}-${{ matrix.arch }}
          path: dbpilot-${{ matrix.os }}-${{ matrix.arch }}

  release:
    name: Create release
    needs: binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Checksum
        run: sha256sum dbpilot-* > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dbpilot-*
            checksums.txt

  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push all PG versions
        run: |
          for version in 14 15 16 17; do
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              -f docker/Dockerfile.backup \
              --build-arg PG_VERSION=$version \
              -t maxwellfaraday/dbpilot-backup:pg${version} \
              --push .
          done
